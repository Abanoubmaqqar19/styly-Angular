<div class="m-5 w-50 pt-3">
    <label class="form-label">Categories</label>
    <select class="form-select form-select-lg" name="catSelect" id="catSelect" [(ngModel)]="selectedCatId">
        <option value="">All Categories</option>
        @for(cat of categories; track cat.id) {
        <option [value]="cat.id">{{ cat.name }}</option>
        }
    </select>
</div>
<!-- //* pass input to child product  -->
<app-product [selectedCatId]="selectedCatId"></app-product>
