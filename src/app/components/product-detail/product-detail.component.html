<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      @if (product) {
      <div class="card h-100" [class.bg-danger]="product.avilableQuantity == 0">
        <img [src]="product.imgUrl" class="card-img-top" alt="{{product.description}}"
          style="height:300px; object-fit:cover;">
        <div class="card-body">
          <h5 class="card-title">{{ product.brandName }}</h5>
          <p class="card-text">{{ product.description }}</p>
          <p class="card-text">
            <strong>Price:</strong><br>
            <span class="text-muted text-decoration-line-through me-2">
              {{ product.price }}
            </span>
            <span class="text-secondary-emphasis fw-bold">
              {{ product.price | discount:20 }}
            </span>
          </p>
          <p class="card-text"><strong>Available:</strong> {{ product.avilableQuantity }}</p>
          <label class="form-label">Quantity</label>
          <input type="number" class="form-control form-control-sm mb-2" min="1" max="25" value="1" #quantityInp
            [disabled]="product.avilableQuantity === 0">
          <button appDisableAfterClick class="btn btn-primary"
            (click)="decreaseQuantity(+quantityInp.value, product.id)" [disabled]="product.avilableQuantity === 0">
            Buy Now
          </button>
        </div>
      </div>
      } @else {
      <p>Product not found.</p>
      }
    </div>
  </div>
</div>
